name: agent wake

# 4x/day cron: the agent wakes at 00:00, 06:00, 12:00, and 18:00 UTC. This
# matches the documented 4x/day cadence and keeps the free OpenRouter pool from
# being hammered into 429 storms. Selective publishing in decide_next means most
# wakes are silent in the public diary; only wakes with something new to say
# produce a public log entry.
# GitHub Actions cron may drift by several minutes under load.
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wake
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent
        run: pip install -e .

      - name: Run one wake
        env:
          OPERATOR_NAME: ${{ vars.OPERATOR_NAME }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Repo coordinates for the diary mirror, also read by wake.py so a
          # fork's face page reads its OWN persona.json via the API path.
          FEED_REPO_OWNER: ${{ vars.FEED_REPO_OWNER }}
          FEED_REPO_NAME: ${{ vars.FEED_REPO_NAME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPERATOR_EMAIL: ${{ vars.OPERATOR_EMAIL }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          # Optional two-way email channel (separate from the one-way Resend
          # digest above). Absent EMAIL_ADDRESS / EMAIL_APP_PASSWORD -> off.
          # Both are secrets, matching docs/SETUP_GUIDE.md Step 8 so a
          # by-the-book forker's channel actually activates.
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_IMAP_HOST: ${{ vars.EMAIL_IMAP_HOST }}
          EMAIL_SMTP_HOST: ${{ vars.EMAIL_SMTP_HOST }}
          # Optional voice unlock. Absent variable / secret -> empty -> off.
          VOICE_ENABLED: ${{ vars.VOICE_ENABLED }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          # Optional TTS model override. Empty -> module default (Kokoro).
          HF_TTS_MODEL: ${{ vars.HF_TTS_MODEL }}
        run: python -m src.wake

      - name: Commit state changes back to the agent repo
        run: |
          git config user.name 'agent'
          git config user.email 'agent@users.noreply.github.com'
          git add state memory ledger logs
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "wake: $(TZ='America/New_York' date +%F)"
            git push
          fi

      - name: Mirror today's public log and persona to the diary repo
        if: always()
        env:
          FEED_GITHUB_TOKEN: ${{ secrets.FEED_GITHUB_TOKEN }}
          FEED_REPO_OWNER: ${{ vars.FEED_REPO_OWNER }}
          FEED_REPO_NAME: ${{ vars.FEED_REPO_NAME }}
        run: |
          if [ -z "$FEED_GITHUB_TOKEN" ] || [ -z "$FEED_REPO_OWNER" ] || [ -z "$FEED_REPO_NAME" ]; then
            echo "Diary mirror not configured (need FEED_GITHUB_TOKEN, FEED_REPO_OWNER, FEED_REPO_NAME). Skipping."
            exit 0
          fi

          TODAY=$(TZ='America/New_York' date +%F)
          PUBLIC_LOG="logs/public/${TODAY}.md"

          # Token-based HTTPS clone of YOUR OWN diary repo. Phone-friendly: no SSH
          # key needed. FEED_GITHUB_TOKEN is a fine-grained PAT with Contents
          # read+write on the diary repo (see docs/SETUP_GUIDE.md Step 7a).
          git clone "https://x-access-token:${FEED_GITHUB_TOKEN}@github.com/${FEED_REPO_OWNER}/${FEED_REPO_NAME}.git" /tmp/feed
          mkdir -p /tmp/feed/logs/public

          # Today's public log, if there is one. A rest wake produces no log,
          # but persona.json still mirrors below so the page stays fresh.
          if [ -f "$PUBLIC_LOG" ]; then
            cp "$PUBLIC_LOG" "/tmp/feed/logs/public/${TODAY}.md"
          else
            echo "No public log produced today (${TODAY}). Mirroring persona only."
          fi

          # persona.json drives the public profile page. Lives next to the logs.
          if [ -f logs/public/persona.json ]; then
            cp logs/public/persona.json /tmp/feed/logs/public/persona.json
          fi

          # Optional voice clips for today.
          if [ -d logs/public/audio ]; then
            mkdir -p /tmp/feed/logs/public/audio
            cp logs/public/audio/* /tmp/feed/logs/public/audio/ 2>/dev/null || true
          fi

          # Seed the persona page and gallery into a fresh diary repo. The guards
          # make this a no-op once the diary repo already carries them.
          if [ ! -f /tmp/feed/index.html ] && [ -f site/index.html ]; then
            cp site/index.html /tmp/feed/index.html
          fi
          if [ ! -f /tmp/feed/community.html ] && [ -f site/community.html ]; then
            cp site/community.html /tmp/feed/community.html
          fi

          cd /tmp/feed
          git config user.name 'agent'
          git config user.email 'agent@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed. Nothing to push."
          else
            git commit -m "wake: ${TODAY}"
            git push origin HEAD
          fi
