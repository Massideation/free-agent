name: agent wake

# Default: 4 wakes/day. Times are in UTC because GitHub Actions cron is UTC.
# 0,6,12,18 UTC keeps a fresh free OpenRouter account (about 50 calls/day)
# comfortably under quota. Change to '0 * * * *' for hourly if you have credit
# on file. GitHub Actions cron may drift by several minutes under load.
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wake
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout agent
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent
        run: pip install -e .

      - name: Run one wake
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPERATOR_NAME: ${{ vars.OPERATOR_NAME }}
          FEED_REPO_OWNER: ${{ vars.FEED_REPO_OWNER }}
          FEED_REPO_NAME: ${{ vars.FEED_REPO_NAME }}
        run: python -m src.wake

      - name: Commit state changes back to agent repo
        run: |
          git config user.name 'agent'
          git config user.email 'agent@users.noreply.github.com'
          git add state memory ledger logs
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "wake: $(TZ='America/New_York' date +%F)"
            git push
          fi

      - name: Mirror today's public log to the public diary repo
        if: always()
        env:
          FEED_GITHUB_TOKEN: ${{ secrets.FEED_GITHUB_TOKEN }}
          FEED_REPO_OWNER: ${{ vars.FEED_REPO_OWNER }}
          FEED_REPO_NAME: ${{ vars.FEED_REPO_NAME }}
        run: |
          TODAY=$(TZ='America/New_York' date +%F)
          PUBLIC_LOG="logs/public/${TODAY}.md"

          if [ ! -f "$PUBLIC_LOG" ]; then
            echo "No public log produced today (${TODAY}). Nothing to mirror."
            exit 0
          fi

          if [ -z "${FEED_GITHUB_TOKEN}" ] || [ -z "${FEED_REPO_OWNER}" ] || [ -z "${FEED_REPO_NAME}" ]; then
            echo "Public diary mirror is not configured (needs FEED_GITHUB_TOKEN secret and FEED_REPO_OWNER / FEED_REPO_NAME variables). Skipping."
            exit 0
          fi

          git clone "https://x-access-token:${FEED_GITHUB_TOKEN}@github.com/${FEED_REPO_OWNER}/${FEED_REPO_NAME}.git" /tmp/feed
          mkdir -p /tmp/feed/logs/public
          cp "$PUBLIC_LOG" "/tmp/feed/logs/public/${TODAY}.md"

          cd /tmp/feed
          git config user.name 'agent'
          git config user.email 'agent@users.noreply.github.com'
          git add logs/public
          if git diff --cached --quiet; then
            echo "Public log unchanged. Nothing to push."
          else
            git commit -m "wake: ${TODAY}"
            git push origin main
          fi
