name: agent wake

# 13:00 UTC = 09:00 EDT (summer) / 08:00 EST (winter).
# GitHub Actions cron may drift by several minutes under load.
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wake
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout agent
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent
        run: pip install -e .

      - name: Run one wake
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FEED_ISSUE_TOKEN: ${{ secrets.FEED_ISSUE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPERATOR_NAME: ${{ vars.OPERATOR_NAME }}
          FEED_REPO_OWNER: ${{ vars.FEED_REPO_OWNER }}
          FEED_REPO_NAME: ${{ vars.FEED_REPO_NAME }}
        run: python -m src.wake

      - name: Commit state changes back to agent repo
        run: |
          git config user.name 'agent'
          git config user.email 'agent@users.noreply.github.com'
          git add state memory ledger logs
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "wake: $(date -u +%F)"
            git push
          fi

      - name: Mirror today's public log to public feed repo
        if: always()
        run: |
          TODAY=$(date -u +%F)
          PUBLIC_LOG="logs/public/${TODAY}.md"

          if [ ! -f "$PUBLIC_LOG" ]; then
            echo "No public log produced today (${TODAY}). Skipping mirror."
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "${{ secrets.FEED_DEPLOY_KEY }}" > ~/.ssh/feed_key
          chmod 600 ~/.ssh/feed_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/feed_key -o IdentitiesOnly=yes -o UserKnownHostsFile=~/.ssh/known_hosts"

          git clone git@github.com:${{ vars.FEED_REPO_OWNER }}/${{ vars.FEED_REPO_NAME }}.git /tmp/feed
          mkdir -p /tmp/feed/logs/public
          cp "$PUBLIC_LOG" "/tmp/feed/logs/public/${TODAY}.md"

          cd /tmp/feed
          git config user.name 'agent'
          git config user.email 'agent@users.noreply.github.com'
          git add logs/public
          if git diff --cached --quiet; then
            echo "Public log unchanged. Nothing to push."
          else
            git commit -m "wake: ${TODAY}"
            git push origin main
          fi

          rm -f ~/.ssh/feed_key
