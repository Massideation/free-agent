# agent-001 runtime settings.
# Paths are relative to the repo root unless absolute.

operator:
  # Your first name is read from the OPERATOR_NAME environment variable, not
  # from here. The profile below tells your agent what YOU do, so it works on
  # your niche and offer instead of a generic intro. See docs/SETUP_GUIDE.md.
  profile:
    # What you do or your business.
    # Example: "freelance Notion template designer for small e-commerce shops"
    niche: ""
    # Who you serve.
    # Example: "Shopify store owners doing under 1M a year"
    audience: ""
    # What you sell.
    # Example: "a 29 dollar Notion ops template and a 200 dollar setup service"
    offer: ""
    # Optional. A link people can pay or sign up at. A free Gumroad or Stripe
    # link works. Leave blank if you do not have one yet.
    # Example: "https://yourname.gumroad.com/l/ops-template"
    payment_link: ""
    # What success looks like for you.
    # Example: "template sales and booked setup calls"
    goal: ""
  # Optional list of things you sell or make. Each item is {name, description}.
  # Leave empty to start. Example:
  #   - name: Ops Template
  #     description: a Notion template that runs a small store's daily operations
  products: []

openrouter:
  api_url: "https://openrouter.ai/api/v1/chat/completions"
  # Ordered list. Free models are tried first. Paid models are only used when
  # level >= 2 and the free tier returned 429 or unavailable (see PRD section 10).
  # Refreshed 2026-06 against the live OpenRouter model list. Ordered largest /
  # most reliable first; the client falls through to the next on any error so a
  # busy free pool no longer strands a wake. All entries are ":free".
  models:
    - "nousresearch/hermes-3-llama-3.1-405b:free"
    - "meta-llama/llama-3.3-70b-instruct:free"
    - "qwen/qwen3-next-80b-a3b-instruct:free"
    - "openai/gpt-oss-120b:free"
    - "google/gemma-4-31b-it:free"
    - "meta-llama/llama-3.2-3b-instruct:free"
    - "liquid/lfm-2.5-1.2b-instruct:free"
  # Last-resort safety net for free-pool rotation. When EVERY model above
  # fails in a live call, the client fetches the live OpenRouter model list
  # and tries up to 3 currently-free models (pricing.prompt and
  # pricing.completion both "0") that were not already tried, in listed
  # order. Paid models are never selected. Set to false to disable the net
  # and fail exactly as before.
  models_dynamic_free_fallback: true

quota:
  # Hard cap on model calls per wake/day at Level 0 (see addendum section 3).
  daily_call_limit: 40

level_file: "state/level.json"

paths:
  root: "."
  state: "state"
  memory: "memory"
  logs_private: "logs/private"
  logs_public: "logs/public"
  ledger: "ledger"

telegram:
  api_url: "https://api.telegram.org"
  max_messages_per_wake: 10

# Optional daily email digest to the operator via Resend.
# Informational only: the code reads env vars, not these keys. The digest is
# sent at most once per Eastern day, and only on a day the agent posts.
email:
  enabled_when: "RESEND_API_KEY and OPERATOR_EMAIL env vars are set"
